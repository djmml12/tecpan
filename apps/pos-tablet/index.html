<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!--
      Tablet viewport:
      - initial-scale=1: render at device CSS pixels
      - maximum-scale=1 + user-scalable=no: prevent accidental pinch-zoom in POS context
      - viewport-fit=cover: fill notched/rounded screen edges (iPad safe areas)
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Chromium/WebView display mode (Android tablets) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS Safari fullscreen when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Prevent iOS tap highlight on the whole app -->
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA theme color — mostaza Tecpancito -->
    <meta name="theme-color" content="#E8A813" />
    <meta name="apple-mobile-web-app-title" content="Tecpancito" />

    <link rel="icon"             href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Tipografía Tecpancito -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&family=Inter+Tight:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Tecpancito POS · Caja</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
